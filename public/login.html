<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingresar · Relojes Indestructibles</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1f232c;
        --text: #e7e9ee;
        --muted: #9aa3b2;
        --primary: #4f8cff;
        --primary-hover: #3a78ef;
        --border: #2a2f3a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 30px;
        width: 100%;
        max-width: 360px;
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 14px 0 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
      }
      button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        background: var(--primary);
        border: none;
        color: white;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { background: var(--primary-hover); }
      .err {
        margin-top: 14px;
        background: rgba(224, 83, 83, 0.1);
        border: 1px solid #e05353;
        color: #e05353;
        padding: 10px;
        border-radius: 6px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <form class="login-box" id="form">
      <h1>Relojes Indestructibles</h1>
      <p>Ingresá tus credenciales para continuar.</p>
      <label>Usuario<input id="user" type="text" autocomplete="username" required /></label>
      <label>Contraseña<input id="pass" type="password" autocomplete="current-password" required /></label>
      <button type="submit">Ingresar</button>
      <div id="err" class="err" hidden></div>
    </form>
    <script>
      document.getElementById('form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const errEl = document.getElementById('err');
        errEl.hidden = true;
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: document.getElementById('user').value,
            pass: document.getElementById('pass').value,
          }),
        });
        if (r.ok) location.href = '/';
        else {
          const data = await r.json().catch(() => ({}));
          errEl.textContent = data.error || 'Credenciales inválidas';
          errEl.hidden = false;
        }
      });
    </script>
  </body>
</html>
